server:
  port: 8087

spring:
  application:
    name: package-service
  datasource:
    url: jdbc:mysql://localhost:3306/planbookai_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: your_password_here   # đổi thành password MySQL thực của bạn
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update             # dev: update | prod: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# JWT secret – bắt buộc GIỐNG NHAU với api-gateway và mọi service khác
app:
  jwt:
    secret: planbookai-very-secure-jwt-secret-key-2025-minimum-32-chars!!!