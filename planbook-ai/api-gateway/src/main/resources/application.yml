server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://localhost:4173"
              - "https://recursive-gastrohepatic-marquis.ngrok-free.dev"
            allowedOriginPatterns:
              - "https://*.ngrok-free.dev"
              - "https://*.loca.lt"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # =================== AUTH SERVICE (port 8081) ===================
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # =================== USER SERVICE (port 8082) ===================
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0

        # =================== CURRICULUM SERVICE (port 8083) ===================
        - id: curriculum-service
          uri: ${CURRICULUM_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/subjects,/api/subjects/**,/api/chapters,/api/chapters/**,/api/topics,/api/topics/**,/api/sample-lesson-plans,/api/sample-lesson-plans/**,/api/lesson-plans,/api/lesson-plans/**,/api/curriculum-templates,/api/curriculum-templates/**,/api/system-config,/api/system-config/**,/api/lesson-templates,/api/lesson-templates/**
          filters:
            - StripPrefix=0

        # =================== QUESTION BANK SERVICE (port 8084) ===================
        - id: question-bank-service
          uri: ${QUESTION_BANK_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/questions/**
          filters:
            - StripPrefix=0

        # =================== EXAM SERVICE (port 8085) ===================
        - id: exam-service
          uri: ${EXAM_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/exams/**
          filters:
            - StripPrefix=0

        # =================== AI SERVICE (port 8086) ===================
        - id: ai-service
          uri: ${AI_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=0

        # =================== PACKAGE SERVICE (port 8087) ===================
        - id: package-service
          uri: ${PACKAGE_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/packages,/api/packages/**,/api/subscriptions,/api/subscriptions/**,/api/revenue,/api/revenue/**,/api/internal,/api/internal/**,/api/payment,/api/payment/**
          filters:
            - StripPrefix=0

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Eureka disabled
eureka:
  client:
    enabled: false

# JWT — phải GIỐNG HỆT secret trong auth-service (team_tasks.md)
jwt:
  secret: ${JWT_SECRET:planbook-ai-super-secret-key-change-this}
