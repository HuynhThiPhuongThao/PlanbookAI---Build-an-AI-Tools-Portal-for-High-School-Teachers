server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # =================== AUTH SERVICE (port 8081) ===================
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # =================== USER SERVICE (port 8082) ===================
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0

      default-filters:
        # Forward JWT token từ Gateway header vào backend services
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

# CORS configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info

            - Method=GET

        # Protected routes
        - id: user-service
          uri: http://planbook-user:8082
          predicates:
            - Path=/api/users/**,/api/profile/**

        - id: curriculum-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/subjects/**,/api/chapters/**,/api/lesson-plans/**

        - id: question-bank-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/questions/**

        - id: exam-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/exams/**

        - id: ai-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/ai/**

        - id: package-service-protected
          uri: http://localhost:8087
          predicates:
            - Path=/api/packages/**,/api/subscriptions/**,/api/internal/**

# JWT secret - phải GIỐNG auth-service và user-service
jwt:
  secret: ${JWT_SECRET:planbook-super-secret-key-change-in-production}

# Tắt Eureka vì không có Eureka Server trong project này
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
