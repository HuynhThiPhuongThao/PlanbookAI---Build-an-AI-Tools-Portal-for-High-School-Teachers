server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Public - không cần token
        - id: auth-service
          uri: http://planbook-auth:8081
          predicates:
            - Path=/api/auth/**

        - id: package-public-get
          uri: http://localhost:8087
          predicates:
            - Path=/api/packages
            - Method=GET

        # Protected routes
        - id: user-service
          uri: http://planbook-user:8082
          predicates:
            - Path=/api/users/**,/api/profile/**

        - id: curriculum-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/subjects/**,/api/chapters/**,/api/lesson-plans/**

        - id: question-bank-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/questions/**

        - id: exam-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/exams/**

        - id: ai-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/ai/**

        - id: package-service-protected
          uri: http://localhost:8087
          predicates:
            - Path=/api/packages/**,/api/subscriptions/**,/api/internal/**

# JWT secret - phải GIỐNG auth-service và user-service
jwt:
  secret: ${JWT_SECRET:planbook-super-secret-key-change-in-production}

# Tắt Eureka vì không có Eureka Server trong project này
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false