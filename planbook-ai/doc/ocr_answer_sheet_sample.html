<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>OCR Answer Sheet Sample</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 32px;
      color: #111827;
    }
    h1 {
      border-bottom: 2px solid #cbd5e1;
      padding-bottom: 12px;
    }
    .meta {
      margin: 16px 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .line {
      border-bottom: 1px solid #9ca3af;
      min-height: 24px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      border: 1px solid #d1d5db;
      padding: 10px;
      text-align: center;
    }
    .filled {
      display: inline-block;
      width: 20px;
      height: 20px;
      line-height: 20px;
      border-radius: 50%;
      background: #111827;
      color: #fff;
      font-weight: bold;
    }
    .empty {
      display: inline-block;
      width: 20px;
      height: 20px;
      line-height: 20px;
      border-radius: 50%;
      border: 1px solid #6b7280;
      color: #6b7280;
    }
    .note {
      margin-top: 24px;
      font-size: 13px;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <h1>Phiếu trả lời trắc nghiệm mẫu cho OCR</h1>

  <div class="meta">
    <div>Họ tên: <span class="line"></span></div>
    <div>Lớp: <span class="line"></span></div>
    <div>Mã đề: <span class="line"></span></div>
    <div>Ngày kiểm tra: <span class="line"></span></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Câu</th>
        <th>A</th>
        <th>B</th>
        <th>C</th>
        <th>D</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>1</td><td><span class="filled">A</span></td><td><span class="empty">B</span></td><td><span class="empty">C</span></td><td><span class="empty">D</span></td></tr>
      <tr><td>2</td><td><span class="empty">A</span></td><td><span class="filled">B</span></td><td><span class="empty">C</span></td><td><span class="empty">D</span></td></tr>
      <tr><td>3</td><td><span class="empty">A</span></td><td><span class="empty">B</span></td><td><span class="filled">C</span></td><td><span class="empty">D</span></td></tr>
      <tr><td>4</td><td><span class="empty">A</span></td><td><span class="empty">B</span></td><td><span class="empty">C</span></td><td><span class="filled">D</span></td></tr>
      <tr><td>5</td><td><span class="filled">A</span></td><td><span class="empty">B</span></td><td><span class="empty">C</span></td><td><span class="empty">D</span></td></tr>
      <tr><td>6</td><td><span class="empty">A</span></td><td><span class="filled">B</span></td><td><span class="empty">C</span></td><td><span class="empty">D</span></td></tr>
      <tr><td>7</td><td><span class="empty">A</span></td><td><span class="empty">B</span></td><td><span class="filled">C</span></td><td><span class="empty">D</span></td></tr>
      <tr><td>8</td><td><span class="empty">A</span></td><td><span class="empty">B</span></td><td><span class="empty">C</span></td><td><span class="filled">D</span></td></tr>
      <tr><td>9</td><td><span class="filled">A</span></td><td><span class="empty">B</span></td><td><span class="empty">C</span></td><td><span class="empty">D</span></td></tr>
      <tr><td>10</td><td><span class="empty">A</span></td><td><span class="filled">B</span></td><td><span class="empty">C</span></td><td><span class="empty">D</span></td></tr>
    </tbody>
  </table>

  <p class="note">
    Có thể mở file này, chụp màn hình hoặc in ra để tạo ảnh mẫu demo OCR. Khi demo, nên dùng ảnh đủ sáng, không nghiêng và giữ rõ số câu cùng đáp án.
  </p>
</body>
</html>
