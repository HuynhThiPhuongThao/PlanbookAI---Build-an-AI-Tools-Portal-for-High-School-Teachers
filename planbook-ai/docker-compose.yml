# =====================================================================
# PlanbookAI - Docker Compose (Microservice Stack)
# =====================================================================
# Chạy: docker compose up -d --build
# Stop: docker compose down
# Stop + xóa data: docker compose down -v
# =====================================================================

services:

  # -------------------------------------------------------------------
  # DATABASE: MySQL duy nhất, hệ xương sống dữ liệu
  # -------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: planbook-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: planbook
      MYSQL_PASSWORD: planbook123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql

    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # REDIS - Bộ nhớ đệm thần tốc (Token Blacklist)
  # -------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: planbook-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # API GATEWAY - Cổng thu phí vô nhà
  # -------------------------------------------------------------------
  api-gateway:
    build: ./api-gateway
    container_name: planbook-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=planbook-super-secret-key-change-in-production
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
    depends_on:
      - auth-service
      - user-service
      # ---- OSIN ĐÃ KHÓA CÁC RÂU RIÊNG Ở DƯỚI ----
      # - curriculum-service
      # - question-bank-service
      # - exam-service
      # - ai-service
      # - packageservice
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # AUTH SERVICE - Bảo vệ gác cổng
  # -------------------------------------------------------------------
  auth-service:
    build: ./auth-service
    container_name: planbook-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_auth
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
      - JWT_EXPIRATION=86400000
    depends_on:
      mysql:
        condition: service_started

    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # USER SERVICE - Sổ hộ khẩu
  # -------------------------------------------------------------------
  user-service:
    build: ./user-service
    container_name: planbook-user
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_user
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - planbook-network

  # ===================================================================
  # ======== CÁC DỊCH VỤ RÁC BỊ OSIN PHONG ẤN TẠM THỜI ================
  # ===================================================================
  
  # curriculum-service:
  #   build: ./curriculum-service
  #   ... (ẩn đi vì chưa xài tới lúc này để web lên lẹ)

  # question-bank-service:
  #   build: ./question-bank-service
  #   ... (ẩn vì tàng hình)

  # exam-service:
  #   build: ./exam-service
  #   ... (ẩn vì nguy cơ lỗi nổ hầm)

  # ai-service:
  #   build: ./ai_service 
  #   ... (ẩn chừng nào nạp api làm trí tuệ nhân tạo nha)

  # packageservice:
  #   build: ./packageservice
  #   ... (ẩn vì cha nội này chôn mẹ nó file Dockerfile)

  # -------------------------------------------------------------------
  # FRONTEND - Mặt tiền dát vàng chói lóa
  # -------------------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: planbook-frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - planbook-network

# =====================================================================
# VOLUMES & NETWORKS
# =====================================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  planbook-network:
    driver: bridge
