# =====================================================================
# PlanbookAI - Docker Compose (Microservice Stack)
# =====================================================================
# Chạy: docker compose up -d --build
# Stop: docker compose down
# Stop + xóa data: docker compose down -v
# =====================================================================
# docker compose up -d --build frontend
services:

  # -------------------------------------------------------------------
  # DATABASE: MySQL duy nhất, hệ xương sống dữ liệu
  # -------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: planbook-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: planbook
      MYSQL_PASSWORD: planbook123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
      # Script 02: Tạo bảng + seed data tự động
      # CHỈ chạy khi volume mysql_data TRỐNG (lần đầu hoặc sau: docker compose down -v)
      - ./db/02-master-seed.sql:/docker-entrypoint-initdb.d/02-master-seed.sql

    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # REDIS - Bộ nhớ đệm thần tốc (Token Blacklist)
  # -------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: planbook-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # API GATEWAY - Cổng thu phí vô nhà
  # -------------------------------------------------------------------
  api-gateway:
    build: ./api-gateway
    container_name: planbook-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=planbook-super-secret-key-change-in-production
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
      - CURRICULUM_SERVICE_URL=http://curriculum-service:8083
      - AI_SERVICE_URL=http://ai-service:8086
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      - auth-service
      - user-service
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # AUTH SERVICE - Bảo vệ gác cổng
  # -------------------------------------------------------------------
  auth-service:
    build: ./auth-service
    container_name: planbook-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_auth
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
      - JWT_EXPIRATION=86400000
    depends_on:
      mysql:
        condition: service_started

    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # USER SERVICE - Sổ hộ khẩu
  # -------------------------------------------------------------------
  user-service:
    build: ./user-service
    container_name: planbook-user
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_user
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - planbook-network

  # ===================================================================
  # ======== CÁC DỊCH VỤ RÁC BỊ OSIN PHONG ẤN TẠM THỜI ================
  # ===================================================================

  # -------------------------------------------------------------------
  # CURRICULUM SERVICE - Xương sống chương trình học
  # -------------------------------------------------------------------
  curriculum-service:
    build: ./curriculum-service
    container_name: planbook-curriculum
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_curriculum
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
    depends_on:
      mysql:
        condition: service_started
    volumes:
      - ./secrets:/app/secrets
    networks:
      - planbook-network

  # question-bank-service:
  #   build: ./question-bank-service
  #   ... (ẩn vì tàng hình)

  # exam-service:
  #   build: ./exam-service
  #   ... (ẩn vì nguy cơ lỗi nổ hầm)

  # -------------------------------------------------------------------
  # AI SERVICE - Não bộ Gemini của hệ thống
  # -------------------------------------------------------------------
  ai-service:
    build: ./ai_service
    container_name: planbook-ai
    restart: unless-stopped
    ports:
      - "8086:8086"
    env_file: .env
    environment:
      - GEMINI_MODEL=gemini-2.5-flash
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=db_ai
      - MYSQL_USER=planbook
      - MYSQL_PASSWORD=planbook123
      - ENVIRONMENT=production
      - LOG_LEVEL=info
    depends_on:
      mysql:
        condition: service_started
    networks:
      - planbook-network

  # packageservice:
  #   build: ./packageservice
  #   ... (ẩn vì cha nội này chôn mẹ nó file Dockerfile)

  # -------------------------------------------------------------------
  # FRONTEND - Mặt tiền dát vàng chói lóa
  # -------------------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: planbook-frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - planbook-network

# =====================================================================
# VOLUMES & NETWORKS
# =====================================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  planbook-network:
    driver: bridge
