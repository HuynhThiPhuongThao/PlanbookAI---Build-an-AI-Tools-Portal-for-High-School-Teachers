# =====================================================================
# PlanbookAI - Docker Compose (Microservice Stack)
# =====================================================================
# Chạy: docker compose up -d --build
# Stop: docker compose down
# Stop + xóa data: docker compose down -v
# =====================================================================

services:

  # -------------------------------------------------------------------
  # DATABASE: MySQL duy nhất, nhưng NHIỀU SCHEMA (db per service)
  # -------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: planbook-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: planbook
      MYSQL_PASSWORD: planbook123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # API GATEWAY - Entry point duy nhất (port 8080)
  # Mọi request từ frontend đều đi qua đây
  # -------------------------------------------------------------------
  api-gateway:
    build: ./api-gateway
    container_name: planbook-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - auth-service
      - user-service
      - curriculum-service
      - question-bank-service
      - exam-service
      - ai-service
      - packageservice
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # AUTH SERVICE - :8081
  # Xử lý: Login, Register, JWT issue, token refresh
  # -------------------------------------------------------------------
  auth-service:
    build: ./auth-service
    container_name: planbook-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_auth
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
      - JWT_EXPIRATION=86400000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # USER SERVICE - :8082
  # Xử lý: CRUD users, roles, permissions
  # -------------------------------------------------------------------
  user-service:
    build: ./user-service
    container_name: planbook-user
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_user
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # CURRICULUM SERVICE - :8083
  # Xử lý: Subject, Chapter, Topic, Lesson Plan Templates
  # -------------------------------------------------------------------
  curriculum-service:
    build: ./curriculum-service
    container_name: planbook-curriculum
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_curriculum
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # QUESTION BANK SERVICE - :8084
  # Xử lý: CRUD questions, options, approval workflow
  # -------------------------------------------------------------------
  question-bank-service:
    build: ./question-bank-service
    container_name: planbook-question
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_question
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
      - CURRICULUM_SERVICE_URL=http://curriculum-service:8083
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # EXAM SERVICE - :8085
  # Xử lý: Tạo đề thi, random version, submit bài, kết quả chấm
  # Gọi question-bank-service qua Feign để lấy câu hỏi
  # Gọi ai-service để OCR chấm bài
  # -------------------------------------------------------------------
  exam-service:
    build: ./exam-service
    container_name: planbook-exam
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_exam
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
      - QUESTION_SERVICE_URL=http://question-bank-service:8084
      - AI_SERVICE_URL=http://ai-service:8086
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # AI SERVICE - :8086 (STATELESS - không có DB)
  # Xử lý: Gọi Gemini AI để sinh bài tập, đề thi, giáo án, OCR chấm bài
  # -------------------------------------------------------------------
  ai-service:
    build: ./ai-service
    container_name: planbook-ai
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET=planbook-super-secret-key-change-in-production
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # PACKAGE SERVICE - :8087
  # Xử lý: Subscription packages, orders
  # -------------------------------------------------------------------
  packageservice:
    build: ./packageservice
    container_name: planbook-package
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/db_package
      - DB_USER=planbook
      - DB_PASS=planbook123
      - JWT_SECRET=planbook-super-secret-key-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - planbook-network

  # -------------------------------------------------------------------
  # FRONTEND - ReactJS (port 3000)
  # -------------------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: planbook-frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - planbook-network

# =====================================================================
# VOLUMES & NETWORKS
# =====================================================================
volumes:
  mysql_data:
    driver: local

networks:
  planbook-network:
    driver: bridge
