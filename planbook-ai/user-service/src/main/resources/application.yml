spring:
  application:
    name: user-service

  datasource:
    # user-service dùng db_user riêng – KHÔNG dùng chung db_auth
    # Đây là nguyên tắc "Database per Service" của Microservice
    url: ${DB_URL:jdbc:mysql://localhost:3307/db_user?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:planbook}
    password: ${DB_PASS:planbook123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8082}   # auth-service: 8081, user-service: 8082

# =====================================================================
# JWT – Dùng để VERIFY token (không issue token mới)
# Secret key phải GIỐNG với auth-service
# =====================================================================
jwt:
  secret: ${JWT_SECRET:planbook-super-secret-key-change-in-production-min-32-chars}

# =====================================================================
# Actuator + Swagger
# =====================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.planbook.user: DEBUG
    org.springframework.security: INFO
