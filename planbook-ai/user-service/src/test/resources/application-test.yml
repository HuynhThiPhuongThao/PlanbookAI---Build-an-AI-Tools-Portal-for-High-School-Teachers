spring:
  datasource:
    url: jdbc:h2:mem:db_user_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;INIT=RUNSCRIPT FROM 'classpath:schema.sql'
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false
        format_sql: true

  flyway:
    enabled: false

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

logging:
  level:
    root: INFO
    com.planbook: DEBUG
