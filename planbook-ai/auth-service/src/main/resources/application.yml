spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/db_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:planbook}
    password: ${DB_PASS:planbook123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update           # auto tạo/update schema từ entity
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    baseline-on-migrate: true    # Chấp nhận DB đã có bảng từ trước (seed SQL) — không crash
    baseline-version: 0          # Version baseline là 0 (trước migration đầu tiên)


  # CORS - cho phép Frontend gọi từ localhost:5173 (Vite dev server)
  web:
    cors:
      allowed-origins: "http://localhost:5173,http://localhost:3000"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true

server:
  port: ${SERVER_PORT:8081}

# =====================================================================
# JWT Configuration
# =====================================================================
jwt:
  secret: ${JWT_SECRET:planbook-super-secret-key-change-in-production-min-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}      # 24 giờ (milliseconds)
  refresh-expiration: ${JWT_REFRESH_EXP:604800000}  # 7 ngày

# =====================================================================
# Actuator - Health check endpoint
# =====================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# =====================================================================
# Swagger / OpenAPI
# =====================================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# =====================================================================
# Logging
# =====================================================================
logging:
  level:
    com.planbook.auth: DEBUG
    org.springframework.security: INFO
