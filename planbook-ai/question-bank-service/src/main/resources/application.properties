server.port=8084
server.servlet.context-path=/api

# H2 Database - LƯU VÀO Ổ CỨNG (không mất data)
spring.datasource.url=jdbc:h2:file:./data/planbook_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# update: giữ dữ liệu khi restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Tắt Security để test API không cần token
spring.security.enabled=false

jwt.secret=planbookai2024superSecretKeyForJWT1234567890
jwt.expiration=86400000