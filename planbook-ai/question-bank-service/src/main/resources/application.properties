server.port=8084
server.servlet.context-path=/api

spring.datasource.url=jdbc:h2:file:./data/planbook_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

ai.service.url=${AI_SERVICE_URL:http://localhost:8086/api/ai}

jwt.secret=${JWT_SECRET:planbook-super-secret-key-change-in-production-min-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}
