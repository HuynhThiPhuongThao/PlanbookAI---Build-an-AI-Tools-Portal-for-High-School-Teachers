server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Public - không cần token
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: package-public-get
          uri: http://localhost:8087
          predicates:
            - Path=/api/packages
            - Method=GET
          filters:
            - StripPrefix=1

        # Protected routes
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**,/api/profile/**
          filters:
            - StripPrefix=1

        - id: curriculum-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/subjects/**,/api/chapters/**,/api/lesson-plans/**
          filters:
            - StripPrefix=1

        - id: question-bank-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/questions/**
          filters:
            - StripPrefix=1

        - id: exam-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/exams/**
          filters:
            - StripPrefix=1

        - id: ai-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1

        - id: package-service-protected
          uri: http://localhost:8087
          predicates:
            - Path=/api/packages/**,/api/subscriptions/**,/api/internal/**
          filters:
            - StripPrefix=1

      # Nếu dùng Eureka thì thêm discovery locator (tùy chọn)
      # discovery:
      #   locator:
      #     enabled: true
      #     lower-case-service-id: true